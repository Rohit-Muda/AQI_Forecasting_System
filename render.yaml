# Render Blueprint — deploy backend from repo root
# Dashboard: New > Blueprint > connect this repo
services:
  - type: web
    name: aqi-forecast-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CORS_ORIGINS
        sync: false
